name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'  # 只在打 tag 时触发，例如 v1.0.0

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up GCC (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y g++

      - name: Set up MinGW (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install mingw -y
          echo "C:/tools/mingw64/bin" >> $GITHUB_PATH

      - name: Set up Clang (macOS)
        if: runner.os == 'macOS'
        run: |
          # Xcode Command Line Tools already installed on macOS runners

      - name: Compile executable
        run: |
          g++ -std=c++17 -O2 -Wall -Wextra -o histogram runner.cpp

      - name: Package for Linux/macOS
        if: runner.os != 'Windows'
        run: |
          chmod +x histogram
          tar -czf histogram-${{ runner.os }}.tar.gz histogram

      - name: Package for Windows
        if: runner.os == 'Windows'
        run: |
          7z a histogram-windows.zip histogram.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: histogram-${{ runner.os }}
          path: |
            histogram*.tar.gz
            histogram*.zip

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 必须授权才能创建 release

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts directory
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec mv {} release-assets/ \;

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: release-assets/*
